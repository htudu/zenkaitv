services:
  api:
    build:
      context: ./api
    container_name: stream-movies-api
    environment:
      APP_ENV: docker
      APP_DEBUG: "true"
      API_CORS_ORIGINS: http://localhost:5173
      DATABASE_URL: sqlite:///./stream_movies.db
      LOCAL_UPLOADS_DIR: /workspace/movie_uploads
      LOCAL_HLS_DIR: /workspace/generated_media/hls
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-movies}
      STREAM_SIGNING_SECRET: ${STREAM_SIGNING_SECRET:-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    depends_on:
      - redis
      - minio

  web:
    build:
      context: ./web
    container_name: stream-movies-web
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/workspace/web
      - web_node_modules:/workspace/web/node_modules
    depends_on:
      - api

  worker:
    build:
      context: ./worker
    container_name: stream-movies-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/workspace
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: stream-movies-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream_movies}
      POSTGRES_USER: ${POSTGRES_USER:-stream_movies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream_movies}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stream-movies-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: stream-movies-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
